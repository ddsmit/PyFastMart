<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="site-header">
        <h1 id="store-title">Loading...</h1>
        <p id="store-description"></p>
    </header>
    <main>
        <section class="filters">
            <input type="text" id="search-input" placeholder="Search products..." aria-label="Search products">
            <select id="sort-select" aria-label="Sort products">
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
                <option value="price-asc">Price (Low to High)</option>
                <option value="price-desc">Price (High to Low)</option>
            </select>
            <div id="tags-container"></div>
        </section>

        <section class="products" id="products-grid" aria-label="Products">
            <div class="loading-container">
                <div class="loading-truck-scene">
                    <div class="loading-clouds">
                        <div class="cloud cloud-1"></div>
                        <div class="cloud cloud-2"></div>
                    </div>
                    <div class="loading-truck">
                        <div class="truck-body">
                            <div class="truck-cabin">
                                <div class="truck-window"></div>
                            </div>
                            <div class="truck-cargo">
                                <div class="cargo-box"></div>
                                <div class="cargo-box"></div>
                                <div class="cargo-box"></div>
                            </div>
                        </div>
                        <div class="truck-wheel front"></div>
                        <div class="truck-wheel back"></div>
                    </div>
                    <div class="loading-road"></div>
                </div>
                <p class="loading-text">
                    Delivering products
                    <span class="loading-dots">
                        <span class="loading-dot"></span>
                        <span class="loading-dot"></span>
                        <span class="loading-dot"></span>
                    </span>
                </p>
            </div>
        </section>
    </main>

    <aside class="cart-popover hidden" id="cart-popover" aria-label="Shopping cart" popover>
        <header class="cart-header">
            <h2>Cart</h2>
            <button id="cart-close" class="cart-close-btn" aria-label="Close cart" popovertarget="cart-popover" popovertargetaction="hide" >X</button>
        </header>
        <div class="cart-items" id="cart-items"></div>
        <footer class="cart-footer">
            <p class="cart-total">Total: <span id="cart-total">$0.00</span></p>
            <button id="checkout-btn" class="btn-primary" disabled>Checkout</button>
        </footer>
    </aside>

    <button class="cart-toggle" id="cart-toggle" aria-label="Open cart" popovertarget="cart-popover">
        <span class="cart-icon">🛒</span>
        <span class="cart-count hidden" id="cart-count">0</span>
    </button>

    <div class="overlay hidden" id="overlay"></div>

    <footer class="site-footer">
        <div class="contact-info">
            <p id="contact-email"></p>
            <p id="contact-phone"></p>
        </div>
        <div class="social-links" id="social-links"></div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
